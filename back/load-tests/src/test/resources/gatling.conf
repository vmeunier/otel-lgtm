#########################
# Gatling Configuration #
#########################

gatling {
  core {
    outputDirectoryBaseName = "ecommercesimulation"
    runDescription = "Tests de charge e-commerce avec generation d'erreurs"
    encoding = "utf-8"

    directory {
      simulations = "src/test/scala"
      resources = "src/test/resources"
      results = "target/gatling"
    }
  }

  charting {
    indicators {
      lowerBound = 800      # Lower bound for the requests' response time to track in the reports and the console summary
      higherBound = 1200    # Higher bound for the requests' response time to track in the reports and the console summary
      percentile1 = 50      # Value for the 1st percentile to track in the reports, the console summary and Graphite
      percentile2 = 75      # Value for the 2nd percentile to track in the reports, the console summary and Graphite
      percentile3 = 95      # Value for the 3rd percentile to track in the reports, the console summary and Graphite
      percentile4 = 99      # Value for the 4th percentile to track in the reports, the console summary and Graphite
    }
  }

  http {
    requestTimeout = 15000                # Timeout of Gatling HTTP requests (ms)
    pooledConnectionIdleTimeout = 60000   # Timeout of pooled connections in ms
    requestTimeout = 15000                # Timeout of requests in ms
  }
}
